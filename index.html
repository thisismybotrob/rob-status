<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROB OS v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0f380f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    overflow: hidden;
  }

  /* ── GAME BOY SHELL ── */
  .gameboy {
    background: #306230;
    border: 6px solid #0f380f;
    border-radius: 18px 18px 18px 18px;
    padding: 16px 18px 20px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: inset 0 0 0 3px #8bac0f;
    position: relative;
    max-width: 620px;
    width: 100%;
  }

  /* ── CARTRIDGE TITLE ── */
  .title-bar {
    color: #9bbc0f;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-align: center;
    text-shadow: 1px 1px 0 #0f380f;
  }
  .title-bar span { color: #8bac0f; font-size: 7px; display:block; margin-top:3px; }

  /* ── SCREEN BEZEL ── */
  .bezel {
    background: #0f380f;
    border: 4px solid #0f380f;
    border-radius: 6px;
    padding: 4px;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    position: relative;
  }

  /* ── LCD SCREEN ── */
  .screen {
    width: 560px; height: 480px;
    background: #9bbc0f;
    position: relative;
    overflow: hidden;
    border: 2px solid #306230;
  }

  /* LCD flicker */
  .screen::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(15,56,15,0.03) 2px,
      rgba(15,56,15,0.03) 4px
    );
    pointer-events: none;
    animation: flicker 4s infinite;
    z-index: 100;
  }
  @keyframes flicker {
    0%,100% { opacity: 0.4; }
    50% { opacity: 0.6; }
    93% { opacity: 0.4; }
    94% { opacity: 0.7; }
    95% { opacity: 0.4; }
  }

  /* ── TILE GRID (checkerboard grass) ── */
  .tile-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg, #8bac0f 25%, transparent 25%),
      linear-gradient(-45deg, #8bac0f 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #8bac0f 75%),
      linear-gradient(-45deg, transparent 75%, #8bac0f 75%);
    background-size: 28px 28px;
    background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    opacity: 0.35;
  }

  /* ── OBSTACLE BASE ── */
  .obstacle {
    position: absolute;
    z-index: 2;
  }

  /* Halfpipe A (top-left) */
  .halfpipe-a {
    left: 30px; top: 50px;
    width: 112px; height: 70px;
    background: #306230;
    border: 4px solid #0f380f;
    border-radius: 6px;
    box-shadow: inset 0 0 0 4px #8bac0f, inset 0 0 0 8px #306230;
  }

  /* Halfpipe B (top-right) */
  .halfpipe-b {
    right: 40px; top: 50px;
    width: 112px; height: 70px;
    background: #306230;
    border: 4px solid #0f380f;
    border-radius: 6px;
    box-shadow: inset 0 0 0 4px #8bac0f, inset 0 0 0 8px #306230;
  }

  /* Rail (center) */
  .rail {
    left: 140px; top: 210px;
    width: 280px; height: 12px;
    background: #0f380f;
    border: 2px solid #306230;
    border-radius: 2px;
    box-shadow: 0 2px 0 #306230;
  }
  .rail::before, .rail::after {
    content: '';
    position: absolute;
    width: 8px; height: 20px;
    background: #306230;
    border: 2px solid #0f380f;
    top: -6px;
  }
  .rail::before { left: 4px; }
  .rail::after { right: 4px; }

  /* Quarter pipe (bottom-left) */
  .quarter-pipe {
    left: 40px; top: 290px;
    width: 84px; height: 84px;
    background: #306230;
    border: 4px solid #0f380f;
    border-radius: 0 0 40px 0;
    box-shadow: inset 0 0 0 4px #8bac0f;
  }
  .quarter-pipe::after {
    content: '';
    position: absolute;
    right: 4px; bottom: 4px;
    width: 30px; height: 30px;
    background: #9bbc0f;
    border-radius: 0 0 20px 0;
  }

  /* Manual pad (bottom-right) */
  .manual-pad {
    right: 60px; top: 300px;
    width: 80px; height: 56px;
    background: #8bac0f;
    border: 4px solid #0f380f;
    box-shadow: inset 0 0 0 4px #306230;
  }

  /* ── SIGN LABELS (Pokémon town signs) ── */
  .sign {
    position: absolute;
    z-index: 10;
    background: #9bbc0f;
    border: 3px solid #0f380f;
    padding: 4px 6px;
    white-space: nowrap;
    box-shadow: 2px 2px 0 #0f380f;
  }
  .sign .sign-title {
    font-size: 5px;
    color: #0f380f;
    display: block;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .sign .sign-status {
    font-size: 5px;
    color: #306230;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .sign .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot.green { background: #4a8c2a; box-shadow: 0 0 2px #4a8c2a; }
  .dot.yellow { background: #8a8c2a; box-shadow: 0 0 2px #8a8c2a; }
  .dot.gray { background: #5a6a3a; }

  /* Sign positions */
  .sign-1 { left: 26px; top: 128px; }
  .sign-2 { right: 36px; top: 128px; }
  .sign-3 { left: 180px; top: 170px; }
  .sign-4 { left: 30px; top: 382px; }
  .sign-5 { right: 50px; top: 364px; }

  /* ── PIXEL SKATERS ── */
  .skater {
    position: absolute;
    z-index: 5;
    width: 10px; height: 16px;
  }
  .skater .head {
    width: 6px; height: 6px;
    background: #8bac0f;
    border: 1px solid #0f380f;
    margin: 0 auto;
  }
  .skater .body {
    width: 8px; height: 8px;
    background: #306230;
    border: 1px solid #0f380f;
    margin: 0 auto;
  }
  .skater .board {
    width: 10px; height: 3px;
    background: #0f380f;
    margin: 0 auto;
    border-radius: 1px;
  }

  /* Skater A — halfpipe-a back-and-forth */
  .skater-a {
    top: 72px;
    animation: skateHP_A 2.4s ease-in-out infinite;
  }
  @keyframes skateHP_A {
    0%, 100% { left: 38px; }
    50% { left: 118px; }
  }

  /* Skater B — halfpipe-b back-and-forth */
  .skater-b {
    top: 72px;
    animation: skateHP_B 2.8s ease-in-out infinite;
  }
  @keyframes skateHP_B {
    0%, 100% { left: 410px; }
    50% { left: 500px; }
  }

  /* Skater C — rail grind left to right */
  .skater-c {
    top: 195px;
    animation: skateRail 3.2s linear infinite;
  }
  @keyframes skateRail {
    0% { left: 148px; }
    90% { left: 398px; }
    100% { left: 148px; }
  }

  /* Skater D — quarter pipe circular */
  .skater-d {
    animation: skateQP 3s linear infinite;
  }
  @keyframes skateQP {
    0%   { left: 50px;  top: 296px; }
    25%  { left: 100px; top: 296px; }
    50%  { left: 100px; top: 350px; }
    75%  { left: 50px;  top: 350px; }
    100% { left: 50px;  top: 296px; }
  }

  /* Skater E — manual pad bounce */
  .skater-e {
    right: 72px; left: auto;
    animation: skatePad 1.2s steps(4) infinite;
  }
  @keyframes skatePad {
    0%, 100% { top: 308px; }
    50% { top: 300px; }
  }

  /* ── STATUS BAR ── */
  .status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 36px;
    background: #306230;
    border-top: 2px solid #0f380f;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 20;
  }
  .status-bar .stats {
    font-size: 5px;
    color: #9bbc0f;
    letter-spacing: 0.5px;
  }
  .status-bar .timestamp {
    font-size: 5px;
    color: #8bac0f;
  }
  .cursor-blink {
    display: inline-block;
    width: 5px; height: 8px;
    background: #9bbc0f;
    margin-left: 4px;
    animation: blink 1s steps(2) infinite;
    vertical-align: middle;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── DECORATIVE TREES (top-down, like Pokémon) ── */
  .tree {
    position: absolute;
    z-index: 1;
    width: 20px; height: 20px;
    background: #306230;
    border: 2px solid #0f380f;
    border-radius: 4px;
  }
  .tree::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 10px; height: 10px;
    background: #8bac0f;
    border-radius: 2px;
  }

  /* ── CONTROLS AREA ── */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-top: 14px;
    padding: 0 10px;
  }

  /* D-PAD */
  .dpad {
    width: 70px; height: 70px;
    position: relative;
  }
  .dpad-h, .dpad-v {
    position: absolute;
    background: #0f380f;
    border-radius: 2px;
  }
  .dpad-h {
    width: 70px; height: 24px;
    top: 23px; left: 0;
  }
  .dpad-v {
    width: 24px; height: 70px;
    top: 0; left: 23px;
  }
  .dpad-center {
    position: absolute;
    width: 18px; height: 18px;
    background: #306230;
    top: 26px; left: 26px;
    border-radius: 2px;
  }

  /* A/B BUTTONS */
  .ab-buttons {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .btn-round {
    width: 32px; height: 32px;
    background: #0f380f;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #9bbc0f;
    box-shadow: 0 2px 0 #000;
  }
  .btn-b { margin-top: 14px; }

  /* ── SELECT / START ── */
  .select-start {
    display: flex;
    gap: 20px;
    margin-top: 10px;
  }
  .ss-btn {
    width: 30px; height: 8px;
    background: #0f380f;
    border-radius: 4px;
    position: relative;
  }
  .ss-label {
    font-size: 4px;
    color: #8bac0f;
    text-align: center;
    margin-top: 2px;
  }

  /* ── PATH TILES ── */
  .path {
    position: absolute;
    background: #8bac0f;
    border: 1px solid #306230;
    opacity: 0.5;
    z-index: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .gameboy { padding: 10px; transform: scale(0.85); transform-origin: top center; }
    .screen { width: 480px; height: 420px; }
  }
</style>
</head>
<body>
<div class="gameboy">
  <!-- TITLE -->
  <div class="title-bar">
    ROB OS v1.0
    <span>◆ SKATE PARK STATUS ◆</span>
  </div>

  <!-- SCREEN BEZEL -->
  <div class="bezel">
    <div class="screen">
      <!-- Grass tiles -->
      <div class="tile-grid"></div>

      <!-- Decorative trees -->
      <div class="tree" style="left:8px;top:10px"></div>
      <div class="tree" style="left:268px;top:8px"></div>
      <div class="tree" style="right:8px;top:178px"></div>
      <div class="tree" style="left:8px;top:230px"></div>
      <div class="tree" style="right:10px;top:260px"></div>
      <div class="tree" style="left:270px;top:290px"></div>
      <div class="tree" style="left:200px;top:380px"></div>
      <div class="tree" style="right:180px;top:400px"></div>

      <!-- Paths -->
      <div class="path" style="left:86px;top:120px;width:14px;height:100px"></div>
      <div class="path" style="left:86px;top:206px;width:60px;height:14px"></div>
      <div class="path" style="right:96px;top:120px;width:14px;height:100px"></div>
      <div class="path" style="right:96px;top:206px;width:50px;height:14px"></div>
      <div class="path" style="left:260px;top:222px;width:14px;height:80px"></div>
      <div class="path" style="left:126px;top:360px;width:140px;height:14px"></div>

      <!-- OBSTACLES -->
      <div class="obstacle halfpipe-a"></div>
      <div class="obstacle halfpipe-b"></div>
      <div class="obstacle rail"></div>
      <div class="obstacle quarter-pipe"></div>
      <div class="obstacle manual-pad"></div>

      <!-- SIGNS -->
      <div class="sign sign-1">
        <span class="sign-title">GHL LOCAL PRO</span>
        <span class="sign-status"><span class="dot green"></span>WRITING ARTICLES</span>
      </div>
      <div class="sign sign-2">
        <span class="sign-title">PRECISION DETAILING</span>
        <span class="sign-status"><span class="dot green"></span>SITE LIVE</span>
      </div>
      <div class="sign sign-3">
        <span class="sign-title">MORNING RECAP</span>
        <span class="sign-status"><span class="dot yellow"></span>NEXT: 8:45AM</span>
      </div>
      <div class="sign sign-4">
        <span class="sign-title">COLD OUTREACH</span>
        <span class="sign-status"><span class="dot gray"></span>WAITING</span>
      </div>
      <div class="sign sign-5">
        <span class="sign-title">GHL AUTOMATIONS</span>
        <span class="sign-status"><span class="dot gray"></span>QUEUED</span>
      </div>

      <!-- SKATERS -->
      <div class="skater skater-a">
        <div class="head"></div><div class="body"></div><div class="board"></div>
      </div>
      <div class="skater skater-b">
        <div class="head"></div><div class="body"></div><div class="board"></div>
      </div>
      <div class="skater skater-c">
        <div class="head"></div><div class="body"></div><div class="board"></div>
      </div>
      <div class="skater skater-d">
        <div class="head"></div><div class="body"></div><div class="board"></div>
      </div>
      <div class="skater skater-e">
        <div class="head"></div><div class="body"></div><div class="board"></div>
      </div>

      <!-- STATUS BAR -->
      <div class="status-bar">
        <span class="stats">ACTIVE: 2 &nbsp; PENDING: 1 &nbsp; IDLE: 2</span>
        <span class="timestamp" id="ts">--:--</span>
        <span class="cursor-blink"></span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="dpad">
      <div class="dpad-h"></div>
      <div class="dpad-v"></div>
      <div class="dpad-center"></div>
    </div>

    <div class="select-start">
      <div><div class="ss-btn"></div><div class="ss-label">SELECT</div></div>
      <div><div class="ss-btn"></div><div class="ss-label">START</div></div>
    </div>

    <div class="ab-buttons">
      <div class="btn-round btn-b">B</div>
      <div class="btn-round">A</div>
    </div>
  </div>
</div>

<script>
  // Update timestamp
  function updateTime() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('ts').textContent = h + ':' + m + ' PST';
  }
  updateTime();
  setInterval(updateTime, 30000);
</script>
</body>
</html>
